<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha</title>
    <style>
        /* ── Reset ── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1b26;
            --bg-secondary: #24283b;
            --bg-input: #1f2335;
            --text-primary: #c0caf5;
            --text-secondary: #565f89;
            --accent: #7aa2f7;
            --accent-hover: #89b4fa;
            --user-bubble: #3b4261;
            --alpha-bubble: #292e42;
            --border: #3b4261;
            --scrollbar-thumb: #3b4261;
            --scrollbar-track: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* ── Layout ── */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ── Header ── */
        #header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        #header .indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9ece6a;
            flex-shrink: 0;
        }

        #header h1 {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        #header .status {
            margin-left: auto;
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* ── Messages ── */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #messages::-webkit-scrollbar {
            width: 6px;
        }

        #messages::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }

        #messages::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 3px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }

        .message.alpha {
            align-self: flex-start;
            background: var(--alpha-bubble);
            border-bottom-left-radius: 4px;
        }

        .message .role {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }

        .message.user .role {
            color: var(--accent);
        }

        .message.alpha .role {
            color: #9ece6a;
        }

        /* ── Input ── */
        #input-area {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        #user-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s ease;
        }

        #user-input:focus {
            border-color: var(--accent);
        }

        #user-input::placeholder {
            color: var(--text-secondary);
        }

        #send-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #1a1b26;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.15s ease;
            flex-shrink: 0;
        }

        #send-btn:hover {
            background: var(--accent-hover);
        }

        #send-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="header">
            <div class="indicator"></div>
            <h1>ALPHA</h1>
            <span class="status">Local &bull; Ready</span>
        </div>

        <div id="messages">
            <div class="message alpha">
                <div class="role">Alpha</div>
                <div class="text">UI connected successfully. WebView2 is operational.</div>
            </div>
        </div>

        <div id="input-area">
            <input
                id="user-input"
                type="text"
                placeholder="Type a message..."
                autocomplete="off"
                autofocus
            />
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        // ── Alpha Chat — Streaming IPC Frontend ──
        //
        // Communicates with Rust via wry IPC:
        //   JS → Rust:  window.ipc.postMessage(JSON)
        //   Rust → JS:  window.__alpha_receive(object)
        //
        // Streaming protocol:
        //   stream_start  → create bubble, show typing, disable input
        //   stream_token  → append token text to bubble
        //   stream_done   → finalize, re-enable input
        //   stream_error  → show error, re-enable input

        const messagesEl = document.getElementById('messages');
        const inputEl    = document.getElementById('user-input');
        const sendBtn    = document.getElementById('send-btn');

        var isStreaming = false;
        var currentStreamEl = null;

        function addMessage(role, text) {
            var msg = document.createElement('div');
            msg.className = 'message ' + role;

            var roleEl = document.createElement('div');
            roleEl.className = 'role';
            roleEl.textContent = role === 'user' ? 'You' : 'Alpha';

            var textEl = document.createElement('div');
            textEl.className = 'text';
            textEl.textContent = text;

            msg.appendChild(roleEl);
            msg.appendChild(textEl);
            messagesEl.appendChild(msg);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return textEl;
        }

        function setInputEnabled(enabled) {
            inputEl.disabled = !enabled;
            sendBtn.disabled = !enabled;
            sendBtn.style.opacity = enabled ? '1' : '0.5';
        }

        // ── IPC: Receive streaming events from Rust ──

        window.__alpha_receive = function(msg) {
            if (!msg || !msg.type) return;

            switch (msg.type) {
                case 'stream_start':
                    isStreaming = true;
                    setInputEnabled(false);
                    // Create the Alpha bubble with a typing indicator.
                    currentStreamEl = addMessage('alpha', '...');
                    break;

                case 'stream_token':
                    if (currentStreamEl && msg.payload && msg.payload.token) {
                        // On first real token, clear the typing indicator.
                        if (currentStreamEl.textContent === '...') {
                            currentStreamEl.textContent = '';
                        }
                        currentStreamEl.textContent += msg.payload.token;
                        messagesEl.scrollTop = messagesEl.scrollHeight;
                    }
                    break;

                case 'stream_done':
                    isStreaming = false;
                    currentStreamEl = null;
                    setInputEnabled(true);
                    inputEl.focus();
                    break;

                case 'stream_error':
                    isStreaming = false;
                    var errorMsg = (msg.payload && msg.payload.error) || 'Unknown error';
                    if (currentStreamEl) {
                        currentStreamEl.textContent = 'Error: ' + errorMsg;
                        currentStreamEl.parentElement.style.borderLeft = '2px solid #f7768e';
                    } else {
                        addMessage('alpha', 'Error: ' + errorMsg);
                    }
                    currentStreamEl = null;
                    setInputEnabled(true);
                    inputEl.focus();
                    break;
            }
        };

        // ── IPC: Send to Rust ──

        function sendMessage() {
            var text = inputEl.value.trim();
            if (!text || isStreaming) return;

            addMessage('user', text);
            inputEl.value = '';

            var request = JSON.stringify({
                type: 'send_message',
                payload: { message: text }
            });

            if (window.ipc && window.ipc.postMessage) {
                window.ipc.postMessage(request);
            } else {
                addMessage('alpha', 'IPC not available. Running in standalone mode.');
            }
        }

        sendBtn.addEventListener('click', sendMessage);

        inputEl.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        console.log('[Alpha] Frontend initialized with streaming IPC.');
    </script>
</body>
</html>
